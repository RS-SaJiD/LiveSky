<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Beautiful Weather Dashboard - Get real-time weather forecasts with LiveSky"/>
  <meta name="theme-color" content="#1e3a8a"/>
  <title>LiveSky - Weather Dashboard 🌤️</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="manifest" href="manifest.json"/>
</head>
<body class="bg-gradient-to-br from-blue-950 to-indigo-950 text-white min-h-screen transition-colors duration-300">

  <div class="max-w-4xl mx-auto p-4">
    
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold flex items-center gap-3" style="font-family: 'Poppins', sans-serif;">
        🌤️ LiveSky
      </h1>
      <div class="flex gap-2">
        <button id="unit-toggle" class="p-3 rounded-xl bg-white/10 hover:bg-white/20 transition" aria-label="Toggle temperature unit (Celsius/Fahrenheit)" title="Toggle Unit">
          <i class="fas fa-thermometer-half text-xl"></i>
        </button>
        <button id="theme-toggle" class="p-3 rounded-xl bg-white/10 hover:bg-white/20 transition" aria-label="Toggle dark/light theme" title="Toggle Theme">
          <i class="fas fa-moon text-xl"></i>
        </button>
      </div>
    </div>

    <!-- Search -->
    <div class="mb-8">
      <div class="relative">
        <input 
          type="text" 
          id="city-input"
          aria-label="Search for a city"
          placeholder="Search city"
          class="w-full bg-white/10 border border-white/20 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:border-blue-400 transition"
          autocomplete="off"
        />
        <button id="search-btn" aria-label="Search weather for the entered city" class="absolute right-4 top-1/2 -translate-y-1/2 bg-blue-600 hover:bg-blue-500 p-3 rounded-xl font-medium transition">
          <i class="fas fa-search text-white text-lg"></i>
        </button>
      </div>
    </div>

    <!-- Error Message -->
    <div id="error-message" class="hidden"></div>

    <!-- Loading -->
    <div id="loading" class="hidden text-center py-12">
      <i class="fas fa-spinner fa-spin text-4xl mb-4"></i>
      <p class="text-lg">Fetching weather data...</p>
    </div>

    <!-- Current Weather -->
    <div id="current-weather" class="hidden glass rounded-3xl p-8 mb-8">
      <!-- JS will fill this -->
    </div>

    <!-- 7 Day Forecast -->
    <div id="forecast" class="hidden">
      <h2 class="text-2xl font-semibold mb-6 flex items-center gap-2">
        <i class="fas fa-calendar-alt"></i> 7-Day Forecast
      </h2>
      <div id="forecast-container" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4">
        <!-- JS will fill cards -->
      </div>
    </div>

    <!-- Favorites Section -->
    <div id="favorites-section" class="hidden mt-12">
      <h2 class="text-2xl font-semibold mb-6 flex items-center gap-2">
        <i class="fas fa-heart"></i> Favorite Cities
      </h2>
      <div id="favorites-container" class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <!-- JS will fill favorites -->
      </div>
    </div>

  </div>

  <!-- Footer -->
  <footer class="fixed bottom-0 left-0 right-0 bg-black/30 backdrop-blur-md text-center py-4 text-sm text-gray-400">
    Copyright © 2026 RS-SaJiD • LiveSky
  </footer>

  <script src="script.js"></script>
</body>
</html>
