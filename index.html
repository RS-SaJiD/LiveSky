<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LiveSky  </title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#1e40af"/>
</head>
<body class="bg-gradient-to-br from-slate-950 to-blue-950 text-white min-h-screen">

  <div class="max-w-4xl mx-auto p-4">
    
    <header class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold flex items-center gap-3">
         LiveSky 
      </h1>
      <button id="theme-toggle" class="p-3 rounded-2xl bg-white/10 hover:bg-white/20 transition-all">
        <i class="fas fa-moon text-2xl"></i>
      </button>
    </header>

    <!-- Search -->
    <div class="mb-8">
      <div class="relative">
        <input 
          type="text" 
          id="city-input"
          placeholder="Search any city... (Dhaka, London, Tokyo)"
          class="w-full bg-white/10 border border-white/20 rounded-3xl px-6 py-5 text-lg focus:outline-none focus:border-blue-400 transition"
        />
        <button id="search-btn" 
                class="absolute right-3 top-1/2 -translate-y-1/2 bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-2xl font-medium transition">
          Search
        </button>
      </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="hidden text-center py-16">
      <i class="fas fa-spinner fa-spin text-5xl text-blue-400 mb-4"></i>
      <p class="text-lg">Fetching weather data...</p>
    </div>

    <!-- Current Weather -->
    <div id="current-weather" class="hidden mb-8"></div>

    <!-- Forecast -->
    <div id="forecast" class="hidden">
      <h2 class="text-2xl font-semibold mb-6 flex items-center gap-2">
        <i class="fas fa-calendar-alt"></i> 7-Day Forecast
      </h2>
      <div id="forecast-container" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
